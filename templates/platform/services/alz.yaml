alz_{{item}}:
  gitops:
    caf_landingzone_branch: {{topology.caf_landingzone_branch}}

  relative_destination_folder: level1/alz/{{item}}


  tfstate:
    lz_key_name: alz_{{item}}
    tfstate: alz_{{item}}.tfstate
    level: level1
    identity_aad_key: cred_alz
    config_file: alz_{{item}}.yaml
    template_lib_folder: platform/level1/alz
    sub_template_folder: platform/level1/alz
    alz_version: {{topology.management_groups[region][item].alz_library_version | default(topology.management_groups[region][item].version_to_deploy | default('v2.1.0'))}}
    alz_library_source: {{topology.management_groups[region][item].alz_library_source | default('embedded')}}
    enable_amba: {{topology.management_groups[region][item].enable_amba | default(False)}}
    enable_slz: {{topology.management_groups[region][item].enable_slz | default(False)}}
    amba_version: "{{topology.management_groups[region][item].amba_version | default('main')}}"
    slz_version: "{{topology.management_groups[region][item].slz_version | default('main')}}"
    yaml: platform/level1/alz/ansible.yaml
    # Do not rename the item_key_name
    tfstate_key_name: alz_{{item}}

  deployments:
    landingzone:
      global_settings_key:
        platform:
          launchpad:
      remote_tfstates:
        platform:
          launchpad:
          identity:
          management:
          platform_subscriptions:

  # Keep the following to allow rover ignite to process the deployment.
  resources:
    launchpad: