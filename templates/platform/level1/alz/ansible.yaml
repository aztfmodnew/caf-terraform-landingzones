- name: "{{level }}-{{ tfstate}} - Set landingzone file_path"
  set_fact:
    mg: "{{ lookup('file', '{{ platform_definition_folder }}/alz/{{tfstate}}/archetype_config_overrides.caf.platform.yaml') | from_yaml }}"
    mg_custom: "{{ lookup('file', '{{ platform_definition_folder }}/alz/{{tfstate}}/custom_landing_zones.caf.platform.yaml') | from_yaml }}"
    level: "{{tfstate_object.level}}"
    definition_source_folder: "{{platform_definition_folder}}/alz/{{ tfstate}}"
    template_source_folder: "{{public_templates_folder}}/{{tfstate_object.template_lib_folder}}"
    alz_library_source: "{{ tfstate_object.alz_library_source | default('embedded') }}"
    enable_amba: "{{ tfstate_object.enable_amba | default(False) }}"
    enable_slz: "{{ tfstate_object.enable_slz | default(False) }}"
    amba_version: "{{ tfstate_object.amba_version | default('main') }}"
    slz_version: "{{ tfstate_object.slz_version | default('main') }}"
    verbosity: 2

- name: "{{ level }}-{{ tfstate }} | Validate ALZ library source"
  fail:
    msg: "alz_library_source='{{ alz_library_source }}' is not supported yet in this release. Use 'embedded'."
  when:
    - alz_library_source != 'embedded'

- debug:
    msg: 
      - "{{destination_path}}"
      - "alz-overrite"
      - "alz_library_source={{ alz_library_source }}"
      - "enable_amba={{ enable_amba }}"
      - "enable_slz={{ enable_slz }}"

- name: "{{ level }}-{{ tfstate }} | Clean-up base directory"
  ansible.builtin.file:
    path: "{{ destination_path }}"
    state: absent
  when:
    - bootstrap.management_groups[region][tfstate].clean_up_destination_folder

- name: "{{ level }}-{{ tfstate }} | Creates directory structure"
  ansible.builtin.file:
    path: "{{ destination_path }}/{{ item.path }}"
    state: directory
    mode: '0755'
  with_filetree: "{{ definition_source_folder }}"
  when: item.state == 'directory'

- name: "{{ level }}-{{ tfstate }} |  Tfvars"
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "{{ destination_path }}/{{ item | basename | regex_replace('.j2$', '') }}"
    force: yes
  with_fileglob:
    - "{{ template_source_folder }}/*.j2"
    - "{{ template_source_folder }}/*.md"

- name: "{{ level }}-{{ tfstate }} |  Lib - archetypes - built-in"
  ansible.builtin.template:
      src: "{{ template_source_folder }}/lib/{{tfstate_object.alz_version}}/archetype_definitions/archetype_definition_template.json.j2"
      dest: "{{ destination_path }}/lib/archetype_definitions/archetype_definition_{{ mg.archetype_definitions[item].archetype_id }}.json"
      force: yes
  loop: "{{ mg.archetype_definitions.keys() }}"
  loop_control:
    loop_var: item

- name: "{{ level }}-{{ tfstate }} |  Lib - AVM archetype definitions - built-in"
  ansible.builtin.template:
      src: "{{ template_source_folder }}/lib/{{tfstate_object.alz_version}}/archetype_definitions/archetype_definition_avm_template.yaml.j2"
      dest: "{{ destination_path }}/lib/archetype_definitions/{{ mg.archetype_definitions[item].archetype_id }}.alz_archetype_definition.yaml"
      force: yes
  loop: "{{ mg.archetype_definitions.keys() }}"
  loop_control:
    loop_var: item

- name: "{{ level }}-{{ tfstate }} |  Lib - archetypes - custom"
  when:
    - mg_custom.archetype_definitions is defined
  ansible.builtin.template:
      src: "{{ template_source_folder }}/lib/{{tfstate_object.alz_version}}/archetype_definitions/custom_landing_zone_template.json.j2"
      dest: "{{ destination_path }}/lib/archetype_definitions/archetype_definition_{{ mg_custom.archetype_definitions[item].archetype_id }}.json"
      force: yes
  loop: "{{ mg_custom.archetype_definitions.keys() }}"
  loop_control:
    loop_var: item

- name: "{{ level }}-{{ tfstate }} |  Lib - AVM archetype definitions - custom"
  when:
    - mg_custom.archetype_definitions is defined
  ansible.builtin.template:
      src: "{{ template_source_folder }}/lib/{{tfstate_object.alz_version}}/archetype_definitions/custom_landing_zone_avm_template.yaml.j2"
      dest: "{{ destination_path }}/lib/archetype_definitions/{{ mg_custom.archetype_definitions[item].archetype_id }}.alz_archetype_definition.yaml"
      force: yes
  loop: "{{ mg_custom.archetype_definitions.keys() }}"
  loop_control:
    loop_var: item

- name: "{{ level }}-{{ tfstate }} |  Lib - AVM architecture definition"
  ansible.builtin.template:
    src: "{{ template_source_folder }}/lib/{{tfstate_object.alz_version}}/architecture_definition.yaml.j2"
    dest: "{{ destination_path }}/lib/{{ bootstrap.management_groups[region][tfstate].management_group_prefix }}.alz_architecture_definition.yaml"
    force: yes

- name: "{{ level }}-{{ tfstate }} | archetypes"
  ansible.builtin.template:
      src: "{{ template_source_folder }}/lib/{{tfstate_object.alz_version}}/{{item}}"
      dest: "{{ destination_path }}/{{ item | basename | regex_replace('.j2$', '') }}"
      force: yes
  loop: 
    - archetype_config_overrides.tfvars.j2
    - custom_landing_zones.tfvars.j2

- name: "{{ level }}-{{ tfstate }} |  Lib"
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ destination_path }}/{{ item.path }}"
    force: yes
  with_filetree: "{{ definition_source_folder }}"
  when: 
    - item.state == 'file' and bootstrap.management_groups[region][tfstate].update_lib_folder

- name: "{{ level }}-{{ tfstate }} |  overrides"
  when:
    - mg_custom.archetype_definitions is defined
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "{{ destination_path }}/{{ item | basename | regex_replace('.j2$', '') }}"
    force: yes
  with_fileglob:
    - "{{ definition_source_folder }}/*.tfvars.j2"

# -----------------------------------------------------------------------
# AMBA (Azure Monitor Baseline Alerts) integration
# Enabled when: bootstrap.management_groups[region][tfstate].enable_amba: True
# Source: https://github.com/Azure/azure-monitor-baseline-alerts
#
# NOTE: AMBA provides policies in ARM/Bicep format (patterns/alz/lib/ does not
# exist). If a future AMBA release adds a Terraform-compatible lib folder,
# the copy tasks below will automatically pick it up.
# For Terraform-native deployment use the AVM modules: https://aka.ms/amba/alz
# -----------------------------------------------------------------------

- name: "{{ level }}-{{ tfstate }} | AMBA"
  when: enable_amba | bool
  block:
    - name: "{{ level }}-{{ tfstate }} | AMBA - Ensure lib subdirectories exist"
      ansible.builtin.file:
        path: "{{ destination_path }}/lib/{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - policy_definitions
        - policy_set_definitions
        - policy_assignments
        - archetype_definitions
        - role_definitions

    - name: "{{ level }}-{{ tfstate }} | AMBA - Clone azure-monitor-baseline-alerts (version={{ amba_version }})"
      ansible.builtin.git:
        repo: "https://github.com/Azure/azure-monitor-baseline-alerts.git"
        dest: "/tmp/amba_{{ tfstate_object.tfstate_key_name }}"
        version: "{{ amba_version }}"
        depth: 1
        force: true

    - name: "{{ level }}-{{ tfstate }} | AMBA - Check Terraform lib path"
      ansible.builtin.stat:
        path: "/tmp/amba_{{ tfstate_object.tfstate_key_name }}/patterns/alz/lib"
      register: amba_lib_stat

    - name: "{{ level }}-{{ tfstate }} | AMBA - Warn: no Terraform-compatible lib found"
      ansible.builtin.debug:
        msg: >-
          AMBA does not yet provide a Terraform-compatible library at patterns/alz/lib.
          Policies are in ARM/Bicep format only and will NOT be merged into library_path.
          To deploy AMBA via Terraform use: https://aka.ms/amba/alz
      when: not amba_lib_stat.stat.exists

    - name: "{{ level }}-{{ tfstate }} | AMBA - Find policy files per subdirectory"
      ansible.builtin.find:
        paths: "/tmp/amba_{{ tfstate_object.tfstate_key_name }}/patterns/alz/lib/{{ item }}"
        patterns: "*.json"
        recurse: false
      loop:
        - policy_definitions
        - policy_set_definitions
        - policy_assignments
        - archetype_definitions
        - role_definitions
      register: amba_found_files
      when: amba_lib_stat.stat.exists

    - name: "{{ level }}-{{ tfstate }} | AMBA - Copy policy files into lib"
      ansible.builtin.copy:
        src: "{{ item.1.path }}"
        dest: "{{ destination_path }}/lib/{{ item.0.item }}/{{ item.1.path | basename }}"
        remote_src: true
        mode: preserve
      loop: "{{ amba_found_files.results | subelements('files') }}"
      loop_control:
        label: "{{ item.1.path | basename }}"
      when: amba_lib_stat.stat.exists

  rescue:
    - name: "{{ level }}-{{ tfstate }} | AMBA - Clone failed"
      ansible.builtin.debug:
        msg: "WARNING: Failed to clone AMBA repository. AMBA policies will NOT be included. Check network connectivity."

  always:
    - name: "{{ level }}-{{ tfstate }} | AMBA - Cleanup temp directory"
      ansible.builtin.file:
        path: "/tmp/amba_{{ tfstate_object.tfstate_key_name }}"
        state: absent

# -----------------------------------------------------------------------
# SLZ (Sovereign Landing Zone) integration
# Enabled when: bootstrap.management_groups[region][tfstate].enable_slz: True
# Source: https://github.com/Azure/sovereign-landing-zone
#
# NOTE: SLZ provides policies in ARM/Bicep format using
# ${varTargetManagementGroupResourceId} scope placeholders, which differ from
# the ${current_scope_resource_id} format required by library_path.
# Multiple candidate paths are checked in case a future release adds a
# Terraform-compatible lib folder.
# -----------------------------------------------------------------------

- name: "{{ level }}-{{ tfstate }} | SLZ"
  when: enable_slz | bool
  block:
    - name: "{{ level }}-{{ tfstate }} | SLZ - Ensure lib subdirectories exist"
      ansible.builtin.file:
        path: "{{ destination_path }}/lib/{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - policy_definitions
        - policy_set_definitions
        - policy_assignments
        - archetype_definitions
        - role_definitions

    - name: "{{ level }}-{{ tfstate }} | SLZ - Clone sovereign-landing-zone (version={{ slz_version }})"
      ansible.builtin.git:
        repo: "https://github.com/Azure/sovereign-landing-zone.git"
        dest: "/tmp/slz_{{ tfstate_object.tfstate_key_name }}"
        version: "{{ slz_version }}"
        depth: 1
        force: true

    - name: "{{ level }}-{{ tfstate }} | SLZ - Check candidate lib paths"
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "/tmp/slz_{{ tfstate_object.tfstate_key_name }}/orchestration/alzLib"
        - "/tmp/slz_{{ tfstate_object.tfstate_key_name }}/modules/policy/lib"
        - "/tmp/slz_{{ tfstate_object.tfstate_key_name }}/lib"
      register: slz_path_candidates

    - name: "{{ level }}-{{ tfstate }} | SLZ - Set lib path from first existing candidate"
      ansible.builtin.set_fact:
        slz_lib_path: "{{ (slz_path_candidates.results | selectattr('stat.exists') | first).item | default('') }}"

    - name: "{{ level }}-{{ tfstate }} | SLZ - Warn: no Terraform-compatible lib found"
      ansible.builtin.debug:
        msg: >-
          SLZ does not provide a Terraform-compatible library path.
          Policies use ARM/Bicep format with ${varTargetManagementGroupResourceId}
          scope placeholders, incompatible with ${current_scope_resource_id}.
          Policy files will NOT be merged into library_path.
          See: https://github.com/Azure/sovereign-landing-zone
      when: slz_lib_path == ''

    - name: "{{ level }}-{{ tfstate }} | SLZ - Find policy files per subdirectory"
      ansible.builtin.find:
        paths: "{{ slz_lib_path }}/{{ item }}"
        patterns: "*.json"
        recurse: false
      loop:
        - policy_definitions
        - policy_set_definitions
        - policy_assignments
        - archetype_definitions
        - role_definitions
      register: slz_found_files
      when: slz_lib_path != ''

    - name: "{{ level }}-{{ tfstate }} | SLZ - Copy policy files into lib"
      ansible.builtin.copy:
        src: "{{ item.1.path }}"
        dest: "{{ destination_path }}/lib/{{ item.0.item }}/{{ item.1.path | basename }}"
        remote_src: true
        mode: preserve
      loop: "{{ slz_found_files.results | subelements('files') }}"
      loop_control:
        label: "{{ item.1.path | basename }}"
      when: slz_lib_path != ''

  rescue:
    - name: "{{ level }}-{{ tfstate }} | SLZ - Clone failed"
      ansible.builtin.debug:
        msg: "WARNING: Failed to clone SLZ repository. SLZ policies will NOT be included. Check network connectivity."

  always:
    - name: "{{ level }}-{{ tfstate }} | SLZ - Cleanup temp directory"
      ansible.builtin.file:
        path: "/tmp/slz_{{ tfstate_object.tfstate_key_name }}"
        state: absent
