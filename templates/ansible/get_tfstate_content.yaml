- debug:
    msg: 
      - "env: '{{env}}'"
      - "exported_variable_name: '{{exported_variable_name}}'"
      - "resource_key: '{{resource_key | default('')}}'"

- set_fact:
    tfstate_obj: "{{resources.tfstates.platform[tfstate_key] if env == '' else resources.tfstates.platform[tfstate_key][env]}}"
    tfstate_key_name: "{{resources.tfstates.platform[tfstate_key].lz_key_name if env == '' else resources.tfstates.platform[tfstate_key][env].lz_key_name}}"
    env_var: "{{ env if env != '' else '' }}"
    tfstate_storage_account_cache_key: "tfstate_storage_account_{{ caf_level | default('level0') }}"

- set_fact:
    storage_account: "{{ lookup('vars', tfstate_storage_account_cache_key, default={}) }}"

# Get tfstate
- name: "[Get {{ tfstate_key_name }} tfstate account name"
  register: storage_account_lookup
  ignore_errors: true
  shell: |
    az storage account list \
      --subscription {{ resources.caf_launchpad.subscription_id }} \
      --query "[?tags.caf_tfstate=='{{ caf_level | default('level0') }}' && tags.caf_environment=='{{ resources.caf_environment }}'][0].name" \
      -o tsv
  args:
    executable: /bin/bash
  when:
    - storage_account == {}

- set_fact:
    storage_account: "{{ storage_account_lookup }}"
  when:
    - storage_account == {}

- set_fact:
    "{{ tfstate_storage_account_cache_key }}": "{{ storage_account }}"
  when:
    - storage_account_lookup is defined

- set_fact:
    "{{tfstate_key_name}}_storage_account": "{{ storage_account }}"

- debug:
    msg: "{{lookup('vars', tfstate_key_name + '_storage_account')}}"

- set_fact:
    tfstate_download_result:
      rc: 1
      stdout: ""
      stderr: ""

- name: "[Get subscription details for {{ tfstate_obj.tfstate }} }}"
  register: tfstate_exists
  ignore_errors: true
  shell: |
    az storage blob download \
      --name "{{ tfstate_obj.tfstate }}" \
      --account-name "{{ lookup('vars', tfstate_key_name + '_storage_account').stdout }}" \
      --container-name "{{ tfstate_obj.workspace | default('tfstate') }}" \
      --auth-mode "login" \
      --file "{{ job_cache_base_path }}/launchpad/{{ tfstate_obj.tfstate }}" 
  when:
    - lookup('vars', tfstate_key_name + '_storage_account').get('rc', 1) == 0
    - lookup('vars', tfstate_key_name + '_storage_account').get('stdout', '') | trim != ""

- set_fact:
    "{{tfstate_key_name}}_tfstate_exists": "{{ lookup('vars', 'tfstate_exists', default=tfstate_download_result) }}"

- name: "Get {{tfstate_key_name}} details from tfstate"
  when:
    - lookup('vars', tfstate_key_name + '_tfstate_exists').get('rc', 1) == 0
  shell: "cat {{ job_cache_base_path }}/launchpad/{{ tfstate_obj.tfstate }}"
  register: "tfstate_file"

- set_fact:
    "{{tfstate_key_name}}_tfstate": "{{ lookup('vars', 'tfstate_file') }}"
  when:
    - lookup('vars', tfstate_key_name + '_tfstate_exists').get('rc', 1) == 0

# - debug:
#     msg: "{{lookup('vars', tfstate_key_name + '_tfstate')}}"

- name: "Get {{tfstate_key_name}} json data"
  when:
    - lookup('vars', tfstate_key_name + '_tfstate_exists').get('rc', 1) == 0
    - lookup('vars', tfstate_key_name + '_storage_account').get('rc', 1) == 0
  set_fact:
    jsondata: "{{ lookup('vars', tfstate_key_name + '_tfstate').stdout | from_json }}"

- name: "Prepare {{tfstate_key_name}} extracted value"
  when:
    - lookup('vars', tfstate_key_name + '_tfstate_exists').get('rc', 1) == 0
    - lookup('vars', tfstate_key_name + '_storage_account').get('rc', 1) == 0
  set_fact:
    tfstate_resource_value: >-
      {{
        (
          (jsondata | default({}))
          .get('outputs', {})
          .get('objects', {})
          .get('value', {})
          .get(tfstate_key_name, {})
          .get(resource_type, {})
        )
        if resource_key is undefined
        else
        (
          (jsondata | default({}))
          .get('outputs', {})
          .get('objects', {})
          .get('value', {})
          .get(tfstate_key_name, {})
          .get(resource_type, {})
          .get(resource_key, {})
        )
      }}

- name: "Set {{exported_variable_name}}"
  when:
    - lookup('vars', tfstate_key_name + '_tfstate_exists').get('rc', 1) == 0
    - lookup('vars', tfstate_key_name + '_tfstate')
    - resource_key is undefined
    - env_var == ''
  set_fact:
    "{{exported_variable_name}}": "{{ tfstate_resource_value }}"

- name: "Set {{exported_variable_name}} with env:{{env}} - no resource_key"
  when:
    - lookup('vars', tfstate_key_name + '_tfstate_exists').get('rc', 1) == 0
    - lookup('vars', tfstate_key_name + '_tfstate')
    - resource_key is undefined
    - env_var != ''
  set_fact:
    "{{exported_variable_name}}": "{{ lookup('vars', exported_variable_name, default={}) | combine({env: tfstate_resource_value}, recursive=True ) }}"

- name: "Set {{exported_variable_name}} - (with resource_key: {{ resource_key | default('') }})"
  when:
    - lookup('vars', tfstate_key_name + '_tfstate_exists').get('rc', 1) == 0
    - lookup('vars', tfstate_key_name + '_tfstate')
    - resource_key is defined
    - env == ''
  set_fact:
    "{{exported_variable_name}}": "{{ tfstate_resource_value }}"


- name: "Set {{exported_variable_name}} with env:'{{env}}' - (with resource_key: {{ resource_key | default('') }})"
  when:
    - resource_key is defined
    - env != ''
    - lookup('vars', tfstate_key_name + '_tfstate_exists').get('rc', 1) == 0
    - lookup('vars', tfstate_key_name + '_tfstate')
  set_fact:
    "{{exported_variable_name}}": "{{ lookup('vars', exported_variable_name, default={}) | combine({env: tfstate_resource_value}, recursive=True ) }}"

- name: "[{{ tfstate_key_name }}] cleanup"
  when:
    - lookup('vars', tfstate_key_name + '_tfstate_exists').get('rc', 1) == 0
  file:
    path: "{{ job_cache_base_path }}/launchpad/{{ tfstate_obj.tfstate }}"
    state: absent
